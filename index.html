<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="方塊下落" />
    <title>方塊下落</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <main class="app" aria-label="方塊下落遊戲">
      <section class="hud" aria-label="遊戲資訊">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>方塊下落</h1>
            <p>Classic tetromino puzzle</p>
          </div>
        </div>

        <div class="stats-grid" aria-live="polite">
          <div class="stat">
            <span>分數</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>最高</span>
            <strong id="best">0</strong>
          </div>
          <div class="stat">
            <span>等級</span>
            <strong id="level">1</strong>
          </div>
          <div class="stat">
            <span>消行</span>
            <strong id="lines">0</strong>
          </div>
        </div>
      </section>

      <section class="play-shell" aria-label="遊戲區">
        <aside class="side-panel left-panel" aria-label="保留方塊">
          <div class="panel-label">Hold</div>
          <canvas id="hold" width="120" height="120" aria-label="保留方塊預覽"></canvas>
        </aside>

        <div class="board-frame">
          <canvas id="board" width="300" height="600" aria-label="方塊遊戲棋盤"></canvas>
          <div id="overlay" class="overlay">
            <div class="overlay-copy">
              <strong id="overlayTitle">準備開始</strong>
              <span id="overlayHint">點一下開始</span>
            </div>
          </div>
        </div>

        <aside class="side-panel right-panel" aria-label="下一個方塊">
          <div class="panel-label">Next</div>
          <canvas id="next" width="120" height="240" aria-label="下一個方塊預覽"></canvas>
        </aside>
      </section>

      <section class="controls" aria-label="觸控操作">
        <div class="control-bank function-bank" aria-label="左手功能鍵">
          <button class="control" id="rotateBtn" type="button" aria-label="旋轉">↻</button>
          <button class="control tall" id="dropBtn" type="button" aria-label="瞬間落下">DROP</button>
          <button class="control" id="holdBtn" type="button" aria-label="保留">HOLD</button>
          <button class="control" id="restartBtn" type="button" aria-label="重新開始">NEW</button>
        </div>
        <div class="control-bank direction-bank" aria-label="右手方向鍵">
          <button class="control" id="leftBtn" type="button" aria-label="左移">←</button>
          <button class="control" id="rightBtn" type="button" aria-label="右移">→</button>
          <button class="control" id="downBtn" type="button" aria-label="加速下落">↓</button>
          <button class="control" id="pauseBtn" type="button" aria-label="暫停">PAUSE</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=3" defer></script>
  </body>
</html>
